repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key
      - id: debug-statements
  
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100', '--target-version=py311']
  
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
        args: ['--profile=black', '--line-length=100']
  
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        language_version: python3.11
        args: ['--max-line-length=100', '--max-complexity=10']
        additional_dependencies: [
          'flake8-bugbear',
          'flake8-comprehensions',
          'flake8-simplify',
          'flake8-return',
          'flake8-import-order',
        ]
  
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        language_version: python3.11
        args: ['--strict', '--ignore-missing-imports']
        additional_dependencies: [
          'types-aiofiles',
          'types-redis',
          'types-requests',
          'types-setuptools',
        ]
  
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        exclude: 'tests/'
  
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 2.3.5
    hooks:
      - id: sqlfluff-lint
        args: ['--dialect=postgres']
        files: '\.(sql)$'
  
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'package.lock.json|yarn.lock'
  
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.20
    hooks:
      - id: pymarkdown
        args: ['scan', '--config', '.pymarkdown.json']
        files: '\.md$'
  
  - repo: https://github.com/dosisod/refurb
    rev: v1.26.0
    hooks:
      - id: refurb
        language_version: python3.11
        args: ['--ignore', 'FURB109,FURB113,FURB118,FURB120,FURB121,FURB132,FURB135,FURB136,FURB148,FURB149,FURB150,FURB157,FURB158,FURB160,FURB163,FURB164,FURB165,FURB167,FURB168,FURB169,FURB170,FURB171,FURB172,FURB173,FURB174,FURB175,FURB176,FURB177,FURB178,FURB179,FURB180,FURB181,FURB182,FURB183,FURB184,FURB185,FURB186,FURB187,FURB188,FURB189,FURB190,FURB191,FURB192,FURB193,FURB194,FURB195,FURB196,FURB197,FURB198,FURB199,FURB200']
  
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest check
        entry: bash -c 'cd /home/cool/.openclaw-trading && python -m pytest tests/unit -xvs'
        language: system
        pass_filenames: false
        stages: [push]
  
  - repo: local
    hooks:
      - id: security-check
        name: security check
        entry: bash -c 'cd /home/cool/.openclaw-trading && safety check'
        language: system
        pass_filenames: false
        stages: [push]

# Global exclude patterns
exclude: |
  (?x)^(
    migrations/|
    .*\.min\.(css|js)$|
    node_modules/|
    .*\.sqlite3$|
    .*\.db$|
    .*\.prof$|
    .*\.log$|
    ^\.git/|
    ^\.venv/|
    ^venv/|
    ^\.tox/|
    ^\.pytest_cache/|
    ^\.mypy_cache/|
    ^\.coverage$
  )