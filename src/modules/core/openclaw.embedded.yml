system:
  environment: development
  debug: false
  log_level: INFO
  name: AI Trading System
  version: 1.0.0
controller:
  auto_restart_modules: true
  max_restart_attempts: 3
  health_check_interval: 30
  event_history_limit: 1000
ai_brain:
  primary_controller: ai_core
  single_write_owner: ai_core
  enable_secondary_controller: false
  enable_autonomous_executor: true
  policy:
    allow_system_open: false
    gateway_sets_leverage: false
api:
  host: 0.0.0.0
  port: 8000
  enable_cors: true
  enable_swagger: true
paths:
  base_path: /app
  data_path: /app/data
  log_path: /app/logs
  workspace_path: /app/workspace
  trade_history_path: data/trade_history
  templates_dir: /app/templates
  models_path: /app/data/models
  memory_path: /app/workspace/memory
  trading_path: /app
timing:
  config_watch_interval: 30
active_trader:
  min_trade_interval: 300
  contract_config:
    leverage_min: 10
    leverage_max: 100
    default_leverage: 20
    max_positions: 5
    min_positions: 3
    margin_mode: cross
proactive_scanner:
  scan_interval: 30
  deep_scan_interval: 300
  proactive_auto_execute_opportunities: false
  proactive_ai_core_forward_cooldown_sec: 180
  proactive_execute_min_confidence: 0.78
  mean_reversion_min_abs_change: 0.08
  breakout_min_volume_vs_prior_avg: 0
  proactive_symbol_trade_cooldown_sec: 180
  breakout_trade_cooldown_sec: 600
  proactive_skip_breakout_if_same_side_position: true
  scanner_opportunity_gate:
    enabled: true
    max_spread_bps: 45.0
    max_entry_vs_last_slippage_pct: 0.015
    min_risk_reward: 1.05
    min_abs_change_24h: 0.0
    require_insight_trend_alignment: true
    min_volume_vs_avg_ratio: 0.0
    volume_avg_lookback_bars: 12
    min_atr_pct_1h: 0.00025
    max_atr_pct_1h: 0.15
  default_symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - XRP/USDT
  - DOGE/USDT
  - ADA/USDT
  - AVAX/USDT
  - DOT/USDT
  - MATIC/USDT
  - LINK/USDT
  - ATOM/USDT
market_intelligence:
  cache_ttl_sec: 20
  push_interval_sec: 15
  watch_symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  contract_cache_ttl_sec: 3600
  fee_rate_taker: 0.0005
  fee_rate_maker: 0.0002
  slippage_spread_multiplier: 1.0
  funding_rate_extreme_abs: 0.001
  funding_rate_high_abs: 0.0005
  open_interest_high: 0
  providers:
  - unified_snapshot
  enable_llm_analysis: false
  llm_timeout_sec: 3.5
  min_quality_score_for_llm: 0.55
data_source_hub:
  enable_legacy_external_analysis: false
  fetch_timeout_sec: 2.8
  snapshot_timeout_sec: 6.0
  include_klines_1h: true
  klines_1h_limit: 64
  exchange_collectors:
  - ticker
  - order_book
  - klines_1h
  - open_interest
  - funding_rate
  - positions
  - open_orders
  - liquidation_proxy
  intel_collectors:
  - onchain.sentiment
  - onchain.flows
  - onchain.whales
  - third_party.sentiment
  - third_party.news
  extra_providers: []
system_maintenance:
  health_thresholds:
    cpu_warning: 70
    cpu_critical: 90
    memory_warning: 75
    memory_critical: 90
    disk_warning: 80
    disk_critical: 95
    error_rate_warning: 0.05
    error_rate_critical: 0.15
ai_trading:
  dynamic_symbol_universe: true
  dynamic_symbol_refresh_seconds: 300
  max_dynamic_symbols: 12
  symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  contract_config:
    enabled: true
    trade_type: swap
    leverage_min: 10
    leverage_max: 100
    default_leverage: 20
    max_positions: 5
    min_positions: 1
    margin_mode: cross
    grid_trading: false
    grid_levels: 5
    grid_spacing: 0.02
  ai_config:
    enabled: true
    model_id: astron-code-latest
    analysis_interval: 120
    min_confidence: 0.75
    max_positions: 5
    risk_per_trade: 0.01
    trade_mode: real
    auto_risk_management: true
    critical_risk_auto_close: false
    critical_risk_auto_close_liq_only: true
    critical_risk_auto_close_max_liq_distance: 0.08
    critical_risk_auto_close_min_loss_pct: 25.0
    max_loss_per_position: 0.05
    daily_loss_limit: 0.1
    max_drawdown_limit: 0.15
proactive_ai:
  scan_interval: 30
  deep_scan_interval: 300
  collect_interval: 300
  action_cooldown: 60
  notifications:
    opportunity_enabled: true
    opportunity_min_confidence: 0.9
    opportunity_min_priority: 8
    opportunity_min_risk_reward: 1.8
    opportunity_require_trend_alignment: true
    opportunity_trend_strength_threshold: 0.04
    opportunity_cooldown_sec: 14400
stop_loss_take_profit:
  trailing_only_mode: true
  trailing_active_on_open: true
  initial_trailing_offset: 0.01
  profit_tier2_pnl_threshold: 0.5
  tier2_trailing_offset: 0.005
  trailing_momentum_adjust_enable: true
  default_stop_loss_percent: 0.03
  default_take_profit_percent: 0.06
  enable_trailing_stop: true
  trailing_stop_offset: 0.01
  trailing_stop_trigger: 0.0
  enable_breakeven: false
  breakeven_trigger: 0.02
  enable_partial_tp: false
  check_interval: 5
  execute_exchange_on_trigger: true
system_monitor: {}
intelligent_monitoring: {}
enhanced_monitoring: {}
unified_data_manager: {}
unified_strategy_system: {}
unified_trade_system: {}
unified_risk_system: {}
memory:
  provider: native
  default_scope: global
  scopes:
    enabled: true
  dual_layer:
    structured_enabled: true
    workspace_markdown_enabled: true
  retrieval:
    mode: hybrid
    vector_weight: 0.7
    bm25_weight: 0.3
    min_score: 0.3
    max_results: 10
    rerank:
      enabled: false
      candidate_pool_size: 12
      min_score: 0.0
  auto_capture:
    enabled: true
    policy:
      deny_tags:
      - noise
      - low_value
      deny_categories:
      - notification_hint
      - market_opportunity_hint
      deny_content_contains:
      - 当前持仓较少
      - 市场机会
      - 系统启动时持仓同步
      - 保证金占用率0.0%
      - 浮亏-0.0%
      deny_memory_ids: []
      min_importance_by_category:
        conversation: 0.2
        config: 0.5
        strategy: 0.6
        risk_setting: 0.6
  auto_recall:
    enabled: true
  disk_policy:
    max_bytes: 0
    min_importance: 0.6
  dedup:
    enabled: true
    window_sec: 172800
    categories:
    - trade_record
    - risk_event
  quality_metrics:
    short_content_threshold: 8
  context_policy:
    conversation_recent_limit: 12
    conversation_recall_limit: 8
    rules_recall_limit: 5
    line_max_chars: 220
    recall_line_max_chars: 240
    startup_bundle_max_total_chars: 12000
    startup_max_chars_per_file: 4000
    decision_engine_recall:
      trade_experience_limit: 12
      strategy_performance_limit: 6
      lesson_query: 经验教训 止损 止盈 滑点
      lesson_limit: 8
notifications:
  enabled: true
  smart:
    block_phrases: []
    quiet_hours_start: '23:00'
    quiet_hours_end: 07:00
    batch_interval_sec: 3600
    rate_limits_per_hour:
      low: 10
      medium: 20
      high: 50
      critical: 100
    dedup_windows_sec:
      critical: 60
      high: 600
      medium: 3600
      low: 21600
    dedup_max_keys: 2000
  telegram:
    failure_dedup_window_sec: 1800
heartbeat:
  enabled: true
  interval_sec: 1800
  market_opportunity_notice_cooldown_sec: 21600
  market_opportunity_notice_enabled: false
research:
  enabled: true
  auto_run: true
  auto_interval_minutes: 360
  symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  dynamic_scan_for_research: true
  symbol_scan_limit: 12
  timeframe: 1h
  lookback_days: 30
  gates:
    min_sharpe: 0.8
    max_drawdown: 0.25
    min_trades: 8
  governance:
    publish_min_score: 0.55
    promote_small_score: 1.1
    redevelop_below_score: 0.35
    discard_below_score: 0.1
  cost_model:
    fee_rate: 0.0005
    slippage_rate: 0.0003
  walk_forward:
    enabled: true
    folds: 3
    train_ratio: 0.7
data:
  history_days: 365
  symbols:
  - BTC/USDT
  - ETH/USDT
  update_interval: 60
monitoring:
  enabled: true
  health_check_interval: 30
  metrics_interval: 60
risk:
  enabled: true
  max_drawdown: 0.1
  position_limit: 0.2
  var_limit: 0.05
trading:
  commission_rate: 0.001
  enabled: true
  max_daily_loss: 0.02
  max_position_count: 10
  max_position_size: 0.1
  paper_trading: true
  slippage_rate: 0.0005
strategy:
  risk_management:
    stop_loss: 0.03
    take_profit: 0.06
