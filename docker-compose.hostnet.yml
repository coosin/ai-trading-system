# 当 bridge 容器无出网 / DNS 全挂时：交易进程用宿主机网络栈（与宿主机 TUN/路由一致）。
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.hostnet.yml up -d
# 或：./scripts/recover_trading_hostnet.sh
#
# Redis 仍走 compose 桥接，映射 6379→宿主机；应用连 127.0.0.1:6379。
# API 在 host 模式下监听宿主机 8000（compose ports 映射不生效）。
#
# 默认只走 HTTP mixed-port（127.0.0.1:7890）；清空 ALL_PROXY，避免 SOCKS5 全失败拖垮客户端。
# 覆盖：.env 中设 OPENCLAW_HOST_HTTP_PROXY 或 CLASH_MIXED_PORT。

services:
  trading-system:
    network_mode: host
    networks: !reset null
    ports: !reset null
    dns: !reset null
    dns_search: !reset null
    dns_opt: !reset null
    extra_hosts: !reset null
    environment:
      REDIS_HOST: "127.0.0.1"
      OPENCLAW_DOCKER_NETWORK_HOST: "1"
      HTTP_PROXY: ${OPENCLAW_HOST_HTTP_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      HTTPS_PROXY: ${OPENCLAW_HOST_HTTP_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW_HTTP_PROXY: ${OPENCLAW_HOST_HTTP_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW_HTTPS_PROXY: ${OPENCLAW_HOST_HTTP_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      ALL_PROXY: ""
      OPENCLAW_ALL_PROXY: ""
      all_proxy: ""
      OPENCLAW_OKX_PROXY_ONLY: "1"
      OPENCLAW_OKX_MAX_CONCURRENCY: "1"
      OPENCLAW_OKX_MARKET_MAX_CONCURRENCY: "1"
      OPENCLAW_OKX_ACCOUNT_MAX_CONCURRENCY: "1"
      OPENCLAW_OKX_MIN_REQUEST_INTERVAL: "1.00"
      OPENCLAW_OKX_MAX_RETRIES: "3"
      OPENCLAW_OKX_TIMEOUT_CONNECT: "6"
      OPENCLAW_OKX_TIMEOUT_SOCK_READ: "10"
      OPENCLAW_OKX_TIMEOUT_TOTAL: "18"
