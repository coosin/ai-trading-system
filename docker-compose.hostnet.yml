# 当默认 bridge 容器出不了网 / DNS 全挂时：交易进程用宿主机网络栈（与宿主机 Clash/TUN 一致）。
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.hostnet.yml up -d
# Redis 仍走 compose 桥接，端口映射到宿主机；应用连 127.0.0.1:6379。
# 注意：API 监听宿主机 8000（或 .env 里 API_PORT，映射在 host 模式下不生效，以容器内 8000 为准）。
#
# host 网络下 **不要** 再用 host.docker.internal做代理地址（新装 Clash 一般只监听 127.0.0.1）。
# 默认把 HTTP(S)_PROXY 与配置里的 global_proxy.host 改到本机环回；端口用 CLASH_MIXED_PORT（默认 7890）。

services:
  trading-system:
    network_mode: host
    networks: !reset null
    ports: !reset null
    dns: !reset null
    dns_search: !reset null
    dns_opt: !reset null
    extra_hosts: !reset null
    environment:
      REDIS_HOST: "127.0.0.1"
      # 覆盖 .env 里可能仍指向 host.docker.internal 的 OPENCLAW_*_PROXY；需要自定义时设 OPENCLAW_HOST_PROXY
      HTTP_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      HTTPS_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      ALL_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW_HTTP_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW_HTTPS_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW_ALL_PROXY: ${OPENCLAW_HOST_PROXY:-http://127.0.0.1:${CLASH_MIXED_PORT:-7890}}
      OPENCLAW__proxy__global_proxy__host: ${OPENCLAW_GLOBAL_PROXY_HOST:-127.0.0.1}
      # 与上面代理 URL 端口一致；新装 Clash 改 mixed-port 时只调 CLASH_MIXED_PORT（或改整条 OPENCLAW_HOST_PROXY）
      OPENCLAW__proxy__global_proxy__port: ${OPENCLAW_GLOBAL_PROXY_PORT:-${CLASH_MIXED_PORT:-7890}}
