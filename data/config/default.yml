api:
  access_token_expire_minutes: 30
  enable_cors: true
  enable_rate_limit: true
  enable_swagger: true
  host: 0.0.0.0
  port: 8000
  rate_limits:
    default:
      burst_size: 10
      requests_per_day: 10000
      requests_per_hour: 1000
      requests_per_minute: 60
  secret_key: your-secret-key-change-in-production
backtest:
  commission: 0.001
  data_source: local
  initial_capital: 10000
  slippage: 0.0005
cache:
  redis_url: redis://localhost:6379/0
  ttl: 300
  type: memory
controller:
  auto_restart_modules: true
  event_history_limit: 1000
  health_check_interval: 30
  max_restart_attempts: 3
data:
  backup_path: data/backup
  default_timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h
  - 1d
  retention_days: 365
  storage_path: data/market
database:
  echo: false
  max_overflow: 10
  pool_size: 5
  type: sqlite
  url: sqlite:///database/trading.db
domains:
  domains: []
  letsencrypt:
    email: ''
    staging: false
exchanges:
  binance:
    api_key: ''
    api_secret: ''
    enabled: false
    sandbox: true
  coinbase:
    api_key: ''
    api_secret: ''
    enabled: false
    passphrase: ''
  okx:
    api_key: ''
    api_secret: ''
    enabled: true
    passphrase: ''
    sandbox: false
    testnet: false
llm:
  default_model: astron-code-latest
  enabled: true
  models:
  - base_url: http://localhost:11434/api/chat
    context_window: 8192
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    display_name: Llama 3 (本地)
    enabled: false
    max_tokens: 2000
    model_id: llama3
    priority: 5
    provider: local
    temperature: 0.7
    timeout: 60.0
  - api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1/chat/completions
    context_window: 128000
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    display_name: DeepSeek Chat (智能对话)
    enabled: true
    max_tokens: 4000
    model_id: deepseek-chat
    priority: 1
    provider: openai
    temperature: 0.8
    timeout: 90.0
  task_model_mapping:
    market_analysis:
    - astron-code-latest
    - lite
    natural_language:
    - astron-code-latest
    - lite
    news_analysis:
    - astron-code-latest
    - lite
    risk_assessment:
    - astron-code-latest
    signal_generation:
    - astron-code-latest
    - lite
    strategy_generation:
    - astron-code-latest
logging:
  backup_count: 5
  file: logs/app.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10MB
memory:
  db_path: data/memory.db
  enabled: true
  max_conversation_history: 50
  retention_days:
    critical: 3650
    high: 365
    low: 7
    normal: 30
monitoring:
  alert_thresholds:
    cpu_usage: 80
    disk_usage: 90
    memory_usage: 80
  enabled: true
  health_check_interval: 30
  metrics_port: 9090
notifications:
  email:
    enabled: false
    from_address: ''
    password: ''
    smtp_host: smtp.gmail.com
    smtp_port: 587
    to_addresses: []
    username: ''
proxy:
  blacklist_domains: []
  enabled: true
  global_proxy:
    enabled: true
    host: host.docker.internal
    name: clash-http
    password: null
    port: 7890
    proxy_type: http
    username: null
  proxies:
  - enabled: true
    host: host.docker.internal
    name: clash-http
    port: 7890
    priority: 0
    proxy_type: http
    retry_count: 3
    timeout: 30
  - enabled: true
    host: host.docker.internal
    name: clash-socks5
    port: 7891
    priority: 1
    proxy_type: socks5
    retry_count: 3
    timeout: 30
  use_global_proxy: true
  whitelist_domains: []
strategy:
  default_symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  default_timeframe: 1h
  risk_management:
    max_drawdown: 0.15
    max_position_size: 0.1
    risk_per_trade: 0.01
    stop_loss: 0.02
    take_profit: 0.05
system:
  debug: true
  environment: development
  name: OpenClaw Trading System
  version: 1.0.0
task_model_mapping:
  natural_language:
  - deepseek-chat
  - llama3
telegram:
  allowed_users: []
  bot_token: ''
  chat_ids:
  - 6716232147
  command_prefix: /
  enabled: true
  message_format:
    disable_web_page_preview: true
    parse_mode: Markdown
  notifications:
    daily_report: true
    risk_alerts: true
    system_alerts: true
    trade_signals: true
trading:
  live:
    enabled: false
    exchange: okx
    max_daily_loss: 1000
    risk_control: true
  mode: simulation
  paper:
    enabled: false
    exchange: okx
    initial_capital: 100000
  simulation:
    contract_type: perpetual
    enabled: true
    fee_rate:
      maker: 0.0002
      taker: 0.0005
    initial_capital: 100000
    leverage: 10
    margin_mode: cross
    symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
