# Prometheus配置文件
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-trading-system'

# 规则文件
rule_files:
  - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # 交易系统指标
  - job_name: 'ai-trader'
    static_configs:
      - targets: ['ai-trader:9091']
        labels:
          service: 'trading-system'
          environment: 'production'

  # Redis指标
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: 'redis'
          environment: 'production'

  # PostgreSQL指标
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
        labels:
          service: 'postgres'
          environment: 'production'

  # Node Exporter（系统指标）
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'host'
          environment: 'production'

  # Prometheus自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093