# Logstash配置文件
# 处理交易系统日志

input {
  # 从文件读取日志
  file {
    path => "/app/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    tags => ["trading_logs"]
  }
  
  # 从TCP端口接收日志
  tcp {
    port => 5000
    codec => "json_lines"
    tags => ["trading_tcp"]
  }
  
  # 从Redis队列接收日志
  redis {
    host => "redis"
    port => 6379
    data_type => "list"
    key => "logstash"
    tags => ["trading_redis"]
  }
}

filter {
  # 解析JSON日志
  if [message] {
    json {
      source => "message"
      target => "log_data"
    }
  }
  
  # 添加时间戳
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  
  # 根据日志级别添加标签
  if [log_data][level] {
    grok {
      match => { "[log_data][level]" => "%{LOGLEVEL:log_level}" }
    }
  }
  
  # 解析交易相关字段
  if [log_data][component] == "trading_engine" {
    grok {
      match => { "[log_data][message]" => "Order %{DATA:order_action}: %{DATA:symbol} %{NUMBER:quantity} @ %{NUMBER:price}" }
    }
  }
  
  # 添加地理位置信息（如果IP存在）
  if [log_data][ip] {
    geoip {
      source => "[log_data][ip]"
      target => "geoip"
    }
  }
  
  # 用户代理解析
  if [log_data][user_agent] {
    useragent {
      source => "[log_data][user_agent]"
      target => "user_agent"
    }
  }
  
  # 移除敏感信息
  mutate {
    remove_field => ["[log_data][api_key]", "[log_data][password]", "[log_data][secret]"]
  }
  
  # 添加环境标签
  mutate {
    add_field => { 
      "environment" => "production"
      "application" => "ai-trading-system"
    }
  }
}

output {
  # 输出到Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "trading-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
    user => "elastic"
    password => "${ES_PASSWORD}"
    template => "/usr/share/logstash/templates/trading-template.json"
    template_name => "trading-logs"
  }
  
  # 同时输出到控制台（用于调试）
  stdout {
    codec => "rubydebug"
  }
  
  # 输出到文件（备份）
  file {
    path => "/app/logs/processed/logstash-%{+YYYY-MM-dd}.log"
    codec => "json_lines"
  }
  
  # 输出到Redis（用于其他处理）
  redis {
    host => "redis"
    port => 6379
    data_type => "list"
    key => "processed_logs"
  }
}