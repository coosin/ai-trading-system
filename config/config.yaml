# OpenClaw Trading — 唯一主配置文件 config/config.yaml
# 勿在 config/ 下再增加业务 YAML/JSON 片段；本机差异请用同目录 local.yaml（见 config.local.example.yaml）。
# 密钥仍使用仓库根目录 .env；环境变量覆盖：OPENCLAW__section__key__nested

system:
  name: OpenClaw Trading
  version: 1.0.0
  mode: production
  debug: false
  log_level: INFO
  environment: production
llm:
  # 主模型：DeepSeek 为主，千帆 / Astron 作为回退
  default_model: deepseek-v4-flash
  # 自动轮询策略：优先MiMo Pro，失败后降级，支持自动恢复
  auto_polling:
    enabled: true
    strategy: priority_with_fallback
    health_check_interval: 300
    recovery_interval: 60
    max_failures_before_switch: 2
    cooldown_after_switch: 30
  models:
  # 0. 千帆 Code Latest — 可用备用（OpenAI 兼容）
  - provider: openai
    model_id: qianfan-code-latest
    display_name: Baidu Qianfan Code Latest
    api_key_env: BAIDU_QIANFAN_API_KEY
    base_url: https://qianfan.baidubce.com/v2/coding
    temperature: 0.35
    max_tokens: 16384
    timeout: 60.0
    max_retries: 3
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 200000
    supports_vision: false
    supports_reasoning: true
    enabled: true
    priority: 140
    region: cn
    notes: Usable fallback via Baidu Qianfan official OpenAI-compatible endpoint
    fallback_models:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - astron-code-latest
  # 1. DeepSeek V4 Flash — 生产默认主模型（低延迟）
  - provider: openai
    model_id: deepseek-v4-flash
    display_name: DeepSeek V4 Flash
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    temperature: 0.35
    max_tokens: 16384
    timeout: 60.0
    max_retries: 4
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 128000
    supports_vision: false
    supports_reasoning: true
    enabled: true
    priority: 160
    region: global
    notes: Production primary via DeepSeek OpenAI-compatible endpoint
    fallback_models:
    - deepseek-v4-pro
    - qianfan-code-latest
    - astron-code-latest
  # 2. DeepSeek V4 Pro — 高推理质量回退 / 重点任务优先
  - provider: openai
    model_id: deepseek-v4-pro
    display_name: DeepSeek V4 Pro
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    temperature: 0.30
    max_tokens: 16384
    timeout: 75.0
    max_retries: 4
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 128000
    supports_vision: false
    supports_reasoning: true
    enabled: true
    priority: 150
    region: global
    notes: Deep reasoning fallback / preferred for complex decisions
    fallback_models:
    - qianfan-code-latest
    - deepseek-v4-flash
    - astron-code-latest
  # 3. 讯飞 Astron Code Latest — 末级备用
  - provider: openai
    model_id: astron-code-latest
    display_name: iFlytek Astron Code Latest
    api_key_env: XFYUN_ASTRON_API_KEY
    base_url: https://maas-coding-api.cn-huabei-1.xf-yun.com/v2
    temperature: 0.4
    max_tokens: 16384
    timeout: 60.0
    max_retries: 3
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 128000
    supports_vision: false
    supports_reasoning: true
    enabled: true
    priority: 120
    region: cn
    notes: Final fallback via iFlytek MaaS coding OpenAI-compatible endpoint
    fallback_models: []
  task_model_mapping:
    # 默认优先 DeepSeek；千帆保留在回退链；Astron 为末级备用
    general:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
    market_analysis:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
    strategy_generation:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
    signal_generation:
    - deepseek-v4-flash
    - deepseek-v4-pro
    - qianfan-code-latest
    - astron-code-latest
    risk_assessment:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
    news_analysis:
    - deepseek-v4-flash
    - deepseek-v4-pro
    - qianfan-code-latest
    - astron-code-latest
    code_generation:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
    natural_language:
    - deepseek-v4-flash
    - deepseek-v4-pro
    - qianfan-code-latest
    - astron-code-latest
    decision_making:
    - deepseek-v4-flash
    - deepseek-v4-pro
    - qianfan-code-latest
    - astron-code-latest
    reasoning:
    - deepseek-v4-pro
    - deepseek-v4-flash
    - qianfan-code-latest
    - astron-code-latest
trading:
  # 默认关注列表（动态选币开启时仍作 always_include 候选）
  symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  # 永续 USDT 合约 + 网格；AI 在规则内自选交易对
  contract:
    products:
    - perpetual_swap
    - grid
    trade_type: swap
    margin_mode: cross
    symbol_universe: preferred_pool
    allowed_symbols: []
    position_mode: oneway
    leverage_min: 20
    leverage_max: 100
    # 自适应杠杆基准（运行时在 20~100 区间内动态调整）
    default_leverage: 30
    # 杠杆分段曲线（atr_pct_1h 口径，按 atr_gte 从高到低匹配）
    # - 高波动 => 更低杠杆；低波动 => 更高杠杆
    leverage_curve:
    - atr_gte: 0.06
      leverage: 20
    - atr_gte: 0.04
      leverage: 24
    - atr_gte: 0.03
      leverage: 28
    - atr_gte: 0.02
      leverage: 32
    - atr_gte: 0.015
      leverage: 36
    - atr_gte: 0.01
      leverage: 45
    - atr_gte: 0.006
      leverage: 60
    - atr_gte: 0.0
      leverage: 75
    # 默认开仓数量（USDT 永续合约张数/数量，按交易所合约规则解释）
    # 以前代码写死 0.01，这里改为配置项，便于按风险/账户规模调整
    default_quantity: 0.01
    max_positions_hedge: 8
    grid_trading: true
    grid_levels: 5
    grid_spacing: 0.02
    enabled: true
  dynamic_symbols:
    max_symbols: 12
    min_symbols: 2
    selection_interval: 300
    min_24h_volume: 10000000
    enable_auto_discovery: true
    preferred_symbols_only: true
    always_exclude: []
  analysis_interval: 60
  # 略降：低波动期仍要求证据，但避免与执行层 0.71 双重过紧
  min_confidence: 0.615
  max_positions: 5
  risk_per_trade: 0.02
  # 统一仓位/持仓入口（唯一推荐入口）
  # - 资金口径：available（可用余额）
  # - 限制口径：margin（保证金占用比例）
  position_limits:
    # 单币种最大开仓保证金占用（占 available 比例）
    symbol_max_margin_ratio: 0.2
    # 同向持仓数上限（long/short 分别计数）
    max_same_direction_positions: 5
    # 单向模式（oneway）下的总持仓上限
    max_positions_oneway: 5
    # 双向对冲并存（同时存在 long 与 short）时的总持仓上限
    max_positions_hedge: 8
    # 最终硬上限（无论任何模式/路径都不得超过）
    hard_max_positions: 8
    # 同一方向开仓/加仓分层门槛（第1-5笔），每笔仍受 symbol_max_margin_ratio=20% 约束
    scale_in_min_confidence_1: 0.72
    scale_in_min_confidence_2: 0.77
    scale_in_min_confidence_3: 0.82
    scale_in_min_confidence_4: 0.87
    scale_in_min_confidence_5: 0.92
  # ExecutionVerifier 开仓探针：同一交易对最短间隔（秒）。0=关闭。用于压制 execution_verifier_open 短时风暴。
  execution_verifier:
    open_symbol_cooldown_sec: 900
  order:
    type: market
    time_in_force: GTC
    post_only: false
  # 旧版固定百分比止盈止损（已弃用；实盘出场由 stop_loss_take_profit 移动止损负责）
  stop_loss:
    enabled: false
    percent: 0.03
    trailing: false
  take_profit:
    enabled: false
    percent: 0.06
    partial:
      enabled: false
      levels:
      - percent: 0.03
        close_percent: 0.5
      - percent: 0.06
        close_percent: 0.5
  commission_rate: 0.001
  enabled: true
  max_daily_loss: 0.02
  max_position_count: 10
  max_position_size: 0.1
  paper_trading: false
  slippage_rate: 0.0005
risk:
  max_drawdown: 0.15
  max_leverage: 100
  margin_call_level: 0.8
  liquidation_level: 0.9
  max_position_size_percent: 0.2
  max_correlation: 0.7
  monitoring:
    enabled: true
    interval: 10
    alert_channels:
    - log
  limits:
    daily_loss_limit: 0.05
    weekly_loss_limit: 0.1
    monthly_loss_limit: 0.15
  enabled: true
  position_limit: 0.2
  var_limit: 0.05
exchanges:
  okx:
    enabled: true
    api_key_env: OKX_API_KEY
    secret_env: OKX_SECRET
    passphrase_env: OKX_PASSPHRASE
    testnet: false
    # 若 API Key 在 OKX「模拟交易」创建，必须为 true，否则 REST 返回 50101（environment mismatch）
    simulated_order_only: true
    rate_limit: 20
    timeout: 30
  binance:
    enabled: false
    api_key_env: BINANCE_API_KEY
    secret_env: BINANCE_SECRET
    testnet: true
    rate_limit: 20
    timeout: 30
data:
  historical:
    enabled: true
    storage_path: data/historical
    max_days: 365
    cleanup_interval: 86400
  realtime:
    enabled: true
    buffer_size: 1000
    update_interval: 1
  timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h
  - 1d
  sources:
  - provider: binance
    enabled: true
    priority: 1
  - provider: coingecko
    enabled: false
    priority: 2
  history_days: 365
  symbols:
  - BTC/USDT
  - ETH/USDT
  update_interval: 60

# 统一快照数据源编排（DataSourceHub）
# 可选扩展数据提供者：coinglass（需设置环境变量 COINGLASS_API_KEY）
data_source_hub:
  extra_providers:
  - coinglass
  - aicoin
strategies:
  max_strategies: 10
  optimization_interval: 3600
  default:
    name: AI智能策略
    enabled: true
    type: ai_driven
  evaluation:
    min_trades: 10
    lookback_days: 30
    metrics:
    - sharpe_ratio
    - win_rate
    - max_drawdown
    - profit_factor
monitoring:
  performance:
    enabled: true
    interval: 60
    metrics:
    - cpu_usage
    - memory_usage
    - network_io
    - disk_io
  trading:
    enabled: true
    track_positions: true
    track_orders: true
    track_pnl: true
  alerts:
    enabled: true
    channels:
      telegram:
        enabled: false
        bot_token_env: TELEGRAM_BOT_TOKEN
        chat_id_env: TELEGRAM_CHAT_ID
      email:
        enabled: false
        smtp_host: smtp.gmail.com
        smtp_port: 587
        smtp_user_env: SMTP_USER
        smtp_password_env: SMTP_PASSWORD
        from_addr: noreply@openclaw-trading.com
        to_addrs: []
  enabled: true

api:
  # 内网白名单：来自这些 CIDR 的写请求可绕过鉴权（用于本机/内网对接）。
  # 默认只放行回环地址；如需 LAN 对接，可追加 192.168.0.0/16 等。
  auth_bypass_enabled: true
  auth_bypass_cidrs:
  - 127.0.0.1/32
  - ::1/128
  health_check_interval: 30
  metrics_interval: 60
telegram:
  enabled: false
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_ids_env: TELEGRAM_CHAT_ID
  proxy: null
# 即时消息总开关（覆盖 SmartNotification 与直连 TG）
messaging:
  instant:
    enabled: false
    channels:
    - log
openclaw_push:
  # 消息通道暂时关闭；保留本地日志即可
  enabled: false
  # 默认标准接入点；若你的 OpenClaw 网关地址不同，请在 local.yaml 覆盖。
  url: http://127.0.0.1:18789/api/events/ingest
  token: ''
  timeout_sec: 3.0
  min_interval_sec: 0.1
  max_queue: 5000
  retry: 3
api:
  enabled: true
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false
  debug: false
  cors:
    enabled: true
    allow_origins:
    - '*'
    allow_methods:
    - '*'
    allow_headers:
    - '*'
  auth:
    enabled: true
    admin_username: cool
    admin_password: '095136'
    api_key_header: X-API-Key
    api_key_env: API_KEY
  enable_cors: true
  enable_swagger: true
database:
  type: sqlite
  path: data/trading.db
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
cache:
  enabled: true
  type: memory
  redis:
    # Docker Compose 默认服务名；本机非容器请用 local.yaml 改为 localhost
    host: redis
    port: 6379
    db: 0
    password_env: REDIS_PASSWORD
  default_ttl: 300
  max_size: 1000
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file:
    enabled: true
    path: logs/trading.log
    max_size: 10MB
    backup_count: 5
  console:
    enabled: true
    colorize: true
proxy:
  enabled: true
  # 网卡级强制分流：在「服务器宿主机」Clash/mihomo 上开 TUN + rules（见 deploy/HOST_CLASH_EGRESS.md）。
  # 验收脚本：scripts/network_connectivity_smoke.py；Clash DNS/OKX 基线：scripts/production_network_baseline.py
  # 此处 egress_model=process_env 表示应用内 HTTP 客户端与 NO_PROXY 合并；与宿主机 TUN 互补。
  egress_model: process_env
  apply_to_process_env: true
  respect_existing_env: true
  force_override_env: false
  merge_no_proxy_from_config: true
  use_global_proxy: true
  # OKX 专用：HTTP 代理经 Clash CONNECT 频繁断开时，可将 ignore_env_proxy 设为 true（OKX REST 直连，需本机出口可达 www.okx.com）
  okx:
    proxy_only: true
    ignore_env_proxy: false
  no_proxy_extra:
  - redis
  - localhost
  - 127.0.0.1
  - host.docker.internal
  global_proxy:
    enabled: true
    proxy_type: http
    # 当前恢复为本机 Mihomo/Clash mixed-port；GCP 隧道链路延迟过高，暂不作为生产默认出口。
    host: 127.0.0.1
    port: 7890
    username_env: PROXY_USER
    password_env: PROXY_PASSWORD
  clash:
    auto_detect: true
    port: 7890
    socks_port: 7891
    api_port: 9090
  domain_proxies: []
  bypass_domains:
  - localhost
  - 127.0.0.1
  - '*.local'
  - '*.internal'
backup:
  enabled: true
  interval: 86400
  retention_days: 30
  include:
  - data
  - config
  - logs
  exclude:
  - '*.tmp'
  - '*.log'
plugins:
  enabled: true
  auto_load: true
  directory: plugins
  loaded: []
development:
  debug: false
  use_mock_data: false
  mock_data_size: 1000
  testing:
    enabled: false
    mock_exchange: true
    mock_llm: true
controller:
  auto_restart_modules: true
  max_restart_attempts: 3
  health_check_interval: 30
  event_history_limit: 1000
ai_core:
  # 生产稳态：保留自动回测/优化，但单轮限额，避免抢占交易主链路。
  authorization:
    auto_backtest: true
    auto_optimize: true
  runtime:
    strategy_check_interval: 3600
    max_backtest_strategies_per_cycle: 1
    max_optimize_strategies_per_cycle: 1
    skip_backtest_if_cpu_above: 85
    skip_optimize_if_cpu_above: 85
ai_core_runtime:
  # 收益修复第一阶段：先压尾部回撤，再提升开仓质量门槛（可回滚小步调参）
  min_confidence_to_trade: 0.60
  ai_core_min_confidence_to_open: 0.72
  ai_core_min_confidence_floor: 0.70
  max_same_direction_ratio: 0.7
  # 快照超时且缺 K 线时允许“有价降级放行”；保留其余硬门控，避免网络抖动把交易机会全部挡掉
  open_allow_snapshot_timeout_fallback: true
  # 统一快照常因 budget 不含 K 线 → 先尝试直连 hub 拉 1H K 线补齐证据（提高可成交性）
  open_attempt_klines_recovery_fetch: true
  open_klines_recovery_fetch_timeout_s: 1.35
  open_klines_recovery_fetch_limit: 80
  open_klines_recovery_min_bars: 20
  # 仍缺 K 线时：仅当错误子集为 klines_missing / ticker 价兜底 且成交价已确认，则放行并缩量（默认 0.62）
  open_allow_klines_missing_evidence_fallback: true
  open_klines_missing_evidence_qty_mult: 0.62
  # Batch1 tune (2026-05-04): small-step relaxation; keep >1.0 to avoid quality collapse.
  min_rr_to_trade: 1.6
  # 当交易所/数据链路降级时，进一步收缩开仓仓位，降低回撤尾部
  degraded_data_quantity_factor: 0.55
  exchange_reachability_degraded_quantity_factor: 0.5
  # 交易所公网探针：略增超时减轻「慢代理误判不可达」；提高缓存 TTL 降低 burst 下重复握手（经 HTTP CONNECT 代理时更明显）
  exchange_reachability_probe_timeout_sec: 1.6
  exchange_reachability_cache_ttl_sec: 18.0
  # LLM 决策路径（_ai_analyze_and_decide）传入 generate 的最大重试轮数；与 OPENCLAW_LLM_CB_* 熔断配合
  llm_decision_max_retries: 2
  # 连亏冷却：更早触发、更长冷却，优先保护资金曲线
  loss_streak_trigger: 2
  loss_streak_cooldown_sec: 3600
  max_spread_bps_to_trade: 42.0
  # 统一分析链路硬门槛：分析质量/置信不足或降级数据时，禁止开仓
  analysis_hard_gate_for_open: true
  analysis_min_confidence_for_open: 0.53
  mi_view_timeout_s: 2.8
  min_data_quality_to_trade: 0.53
  analysis_require_not_degraded_for_open: true
  # 低波动缓趋势：与引擎内 low_vol_grind 市况对齐（可热更新）
  regime_trend_threshold: 0.0048
  # Batch1 tune: raise grind trend floor to filter sideways noise.
  regime_grind_min_trend_abs: 0.0007
  regime_grind_max_atr_mult: 1.25
  # SR 由纯否决器升级为入场确认器：开仓前要求出现回踩/突破确认。
  sr_timing_guard_enable: true
  sr_entry_confirmation_required: false
  # 放宽“靠近关键位”判定，避免 ETH/BNB 这类距支撑约 0.6%~0.8% 的场景长期被判为“不靠近关键位”
  sr_near_level_pct: 0.0105
  # 轻微放宽突破确认缓冲，减少刚越过阻力/支撑时被视为“尚未确认”的假阴性
  sr_breakout_buffer_pct: 0.001
  low_vol_grind_profile_min_rr_mult: 0.98
  low_vol_grind_profile_spread_mult: 1.06
  regime_profile_overrides:
    trend:
      min_rr_mult: 0.95
      spread_mult: 1.06
      qty_mult: 1.05
      min_conf_add: -0.005
    range:
      min_rr_mult: 0.99
      spread_mult: 1.0
      qty_mult: 1.03
      min_conf_add: 0.0
    high_vol:
      min_rr_mult: 1.35
      spread_mult: 0.82
      qty_mult: 0.25
      min_conf_add: 0.07
    volatile:
      min_rr_mult: 1.35
      spread_mult: 0.82
      qty_mult: 0.25
      min_conf_add: 0.07
    low_liquidity:
      min_rr_mult: 1.16
      spread_mult: 0.76
      qty_mult: 0.55
      min_conf_add: 0.04
    low_vol_grind:
      min_rr_mult: 0.96
      spread_mult: 1.07
      qty_mult: 0.88
      min_conf_add: -0.012
  regime_policy_matrix:
    trend:
      leverage_mult: 1.0
      qty_mult: 1.0
    range:
      leverage_mult: 0.95
      qty_mult: 0.95
    low_vol_grind:
      leverage_mult: 0.9
      qty_mult: 0.92
      sltp_profile: grind_tight
    high_vol:
      leverage_mult: 0.55
      qty_mult: 0.65
      sltp_profile: high_vol_wide
      advisory_only: true
    volatile:
      leverage_mult: 0.55
      qty_mult: 0.65
      sltp_profile: high_vol_wide
      advisory_only: true
    low_liquidity:
      leverage_mult: 0.8
      qty_mult: 0.85
    normal:
      leverage_mult: 1.0
      qty_mult: 1.0
  # 净边际：低波动时边际更薄，略降仍要求为正
  edge_min_net_reward_pct: 0.004
  # hold_avoidance_override：缓趋势下 fusion sentiment 往往较小，略放宽
  hold_avoidance_override_min_abs_sentiment: 0.034
  hold_avoidance_override_min_mi_quality_score: 0.545
  hold_override_high_risk_min_effective_conf: 0.5
  hold_override_high_risk_min_mi_quality: 0.55
  hold_override_high_risk_min_mi_conf: 0.3
  hold_avoidance_override_require_mi_trend_alignment: false
  hold_avoidance_override_cooldown_sec: 300
  ai_autonomy_min_conf_floor: 0.51
  ai_autonomy_min_mi_confidence: 0.53
  ai_autonomy_min_mi_quality_score: 0.5
ai_brain:
