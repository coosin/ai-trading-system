# OpenClaw Trading — 唯一主配置文件 config/config.yaml
# 勿在 config/ 下再增加业务 YAML/JSON 片段；本机差异请用同目录 local.yaml（见 config.local.example.yaml）。
# 密钥仍使用仓库根目录 .env；环境变量覆盖：OPENCLAW__section__key__nested

system:
  name: OpenClaw Trading
  version: 1.0.0
  mode: production
  debug: false
  log_level: INFO
  environment: production
llm:
  # 主模型：小米MiMo Pro + MiMo + 备用：百度千帆
  default_model: mimo-v2.5-pro
  # 自动轮询策略：优先MiMo Pro，失败后降级，支持自动恢复
  auto_polling:
    enabled: true
    strategy: priority_with_fallback
    health_check_interval: 300
    recovery_interval: 60
    max_failures_before_switch: 2
    cooldown_after_switch: 30
  models:
  # 1. MiMo Pro - 旗舰推理模型，最高优先级
  - provider: openai
    model_id: mimo-v2.5-pro
    display_name: MiMo V2.5 Pro (旗舰)
    api_key_env: MIMO_API_KEY
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    temperature: 0.5
    max_tokens: 16000
    timeout: 45.0
    max_retries: 2
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 200000
    supports_vision: true
    supports_reasoning: true
    enabled: true
    priority: 100
    region: cn
    notes: 2亿信用点，非高峰0.8x系数，TTS免费
    fallback_models:
    - mimo-v2.5
    - qianfan-code-latest
  # 2. MiMo 标准版 - 主力模型
  - provider: openai
    model_id: mimo-v2.5
    display_name: MiMo V2.5 (主力)
    api_key_env: MIMO_API_KEY
    base_url: https://token-plan-cn.xiaomimimo.com/v1
    temperature: 0.6
    max_tokens: 8000
    timeout: 30.0
    max_retries: 2
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 128000
    supports_vision: true
    supports_reasoning: false
    enabled: true
    priority: 80
    region: cn
    notes: 2亿信用点，非高峰0.8x系数
    fallback_models:
    - mimo-v2.5-pro
    - qianfan-code-latest
  # 3. 百度千帆 - 备用模型
  - provider: openai
    model_id: qianfan-code-latest
    display_name: Baidu Qianfan (备用)
    api_key_env: BAIDU_QIANFAN_API_KEY
    base_url: https://qianfan.baidubce.com/v2/coding
    temperature: 0.5
    max_tokens: 8000
    timeout: 45.0
    max_retries: 2
    cost_per_input_token: 0.0
    cost_per_output_token: 0.0
    context_window: 200000
    supports_vision: true
    supports_reasoning: false
    enabled: true
    priority: 50
    region: cn
    notes: 备用模型，当MiMo不可用时切换
    fallback_models:
    - mimo-v2.5-pro
    - mimo-v2.5
  task_model_mapping:
    # 所有任务类型优先使用MiMo Pro，其次是MiMo标准版，最后是百度千帆备用
    general:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    market_analysis:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    strategy_generation:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    signal_generation:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    risk_assessment:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    news_analysis:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    code_generation:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    natural_language:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    # 新增任务类型映射
    decision_making:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
    reasoning:
    - mimo-v2.5-pro
    - mimo-v2.5
    - qianfan-code-latest
trading:
  # 默认关注列表（动态选币开启时仍作 always_include 候选）
  symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  # 永续 USDT 合约 + 网格；AI 在规则内自选交易对
  contract:
    products:
    - perpetual_swap
    - grid
    trade_type: swap
    margin_mode: cross
    symbol_universe: full_exchange
    allowed_symbols: []
    position_mode: oneway
    leverage_min: 20
    leverage_max: 100
    # 自适应杠杆基准（运行时在 20~100 区间内动态调整）
    default_leverage: 30
    # 杠杆分段曲线（atr_pct_1h 口径，按 atr_gte 从高到低匹配）
    # - 高波动 => 更低杠杆；低波动 => 更高杠杆
    leverage_curve:
    - atr_gte: 0.06
      leverage: 20
    - atr_gte: 0.04
      leverage: 24
    - atr_gte: 0.03
      leverage: 28
    - atr_gte: 0.02
      leverage: 32
    - atr_gte: 0.015
      leverage: 36
    - atr_gte: 0.01
      leverage: 45
    - atr_gte: 0.006
      leverage: 60
    - atr_gte: 0.0
      leverage: 75
    # 默认开仓数量（USDT 永续合约张数/数量，按交易所合约规则解释）
    # 以前代码写死 0.01，这里改为配置项，便于按风险/账户规模调整
    default_quantity: 0.01
    max_positions_hedge: 8
    grid_trading: true
    grid_levels: 5
    grid_spacing: 0.02
    enabled: true
  dynamic_symbols:
    max_symbols: 12
    min_symbols: 2
    selection_interval: 300
    min_24h_volume: 10000000
    enable_auto_discovery: true
    always_exclude: []
  analysis_interval: 60
  # 略降：低波动期仍要求证据，但避免与执行层 0.71 双重过紧
  min_confidence: 0.615
  max_positions: 5
  risk_per_trade: 0.02
  # 统一仓位/持仓入口（唯一推荐入口）
  # - 资金口径：available（可用余额）
  # - 限制口径：margin（保证金占用比例）
  position_limits:
    # 单币种最大开仓保证金占用（占 available 比例）
    symbol_max_margin_ratio: 0.2
    # 同向持仓数上限（long/short 分别计数）
    max_same_direction_positions: 5
    # 单向模式（oneway）下的总持仓上限
    max_positions_oneway: 5
    # 双向对冲并存（同时存在 long 与 short）时的总持仓上限
    max_positions_hedge: 8
    # 最终硬上限（无论任何模式/路径都不得超过）
    hard_max_positions: 8
    # 同一方向加仓分层门槛（第2/3/4笔），每笔仍受 symbol_max_margin_ratio=20% 约束
    scale_in_min_confidence_2: 0.77
    scale_in_min_confidence_3: 0.82
    scale_in_min_confidence_4: 0.87
  # ExecutionVerifier 开仓探针：同一交易对最短间隔（秒）。0=关闭。用于压制 execution_verifier_open 短时风暴。
  execution_verifier:
    open_symbol_cooldown_sec: 900
  order:
    type: market
    time_in_force: GTC
    post_only: false
  # 旧版固定百分比止盈止损（已弃用；实盘出场由 stop_loss_take_profit 移动止损负责）
  stop_loss:
    enabled: false
    percent: 0.03
    trailing: false
  take_profit:
    enabled: false
    percent: 0.06
    partial:
      enabled: false
      levels:
      - percent: 0.03
        close_percent: 0.5
      - percent: 0.06
        close_percent: 0.5
  commission_rate: 0.001
  enabled: true
  max_daily_loss: 0.02
  max_position_count: 10
  max_position_size: 0.1
  paper_trading: false
  slippage_rate: 0.0005
risk:
  max_drawdown: 0.15
  max_leverage: 100
  margin_call_level: 0.8
  liquidation_level: 0.9
  max_position_size_percent: 0.2
  max_correlation: 0.7
  monitoring:
    enabled: true
    interval: 10
    alert_channels:
    - telegram
    - log
  limits:
    daily_loss_limit: 0.05
    weekly_loss_limit: 0.1
    monthly_loss_limit: 0.15
  enabled: true
  position_limit: 0.2
  var_limit: 0.05
exchanges:
  okx:
    enabled: true
    api_key_env: OKX_API_KEY
    secret_env: OKX_SECRET
    passphrase_env: OKX_PASSPHRASE
    testnet: false
    rate_limit: 20
    timeout: 30
  binance:
    enabled: false
    api_key_env: BINANCE_API_KEY
    secret_env: BINANCE_SECRET
    testnet: true
    rate_limit: 20
    timeout: 30
data:
  historical:
    enabled: true
    storage_path: data/historical
    max_days: 365
    cleanup_interval: 86400
  realtime:
    enabled: true
    buffer_size: 1000
    update_interval: 1
  timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h
  - 1d
  sources:
  - provider: binance
    enabled: true
    priority: 1
  - provider: coingecko
    enabled: true
    priority: 2
  history_days: 365
  symbols:
  - BTC/USDT
  - ETH/USDT
  update_interval: 60

# 统一快照数据源编排（DataSourceHub）
# 可选扩展数据提供者：coinglass（需设置环境变量 COINGLASS_API_KEY）
data_source_hub:
  extra_providers:
  - coinglass
  - aicoin
strategies:
  max_strategies: 10
  optimization_interval: 3600
  default:
    name: AI智能策略
    enabled: true
    type: ai_driven
  evaluation:
    min_trades: 10
    lookback_days: 30
    metrics:
    - sharpe_ratio
    - win_rate
    - max_drawdown
    - profit_factor
monitoring:
  performance:
    enabled: true
    interval: 60
    metrics:
    - cpu_usage
    - memory_usage
    - network_io
    - disk_io
  trading:
    enabled: true
    track_positions: true
    track_orders: true
    track_pnl: true
  alerts:
    enabled: true
    channels:
      telegram:
        enabled: true
        bot_token_env: TELEGRAM_BOT_TOKEN
        chat_id_env: TELEGRAM_CHAT_ID
      email:
        enabled: false
        smtp_host: smtp.gmail.com
        smtp_port: 587
        smtp_user_env: SMTP_USER
        smtp_password_env: SMTP_PASSWORD
        from_addr: noreply@openclaw-trading.com
        to_addrs: []
  enabled: true

api:
  # 内网白名单：来自这些 CIDR 的写请求可绕过鉴权（用于本机/内网对接）。
  # 默认只放行回环地址；如需 LAN 对接，可追加 192.168.0.0/16 等。
  auth_bypass_enabled: true
  auth_bypass_cidrs:
  - 127.0.0.1/32
  - ::1/128
  health_check_interval: 30
  metrics_interval: 60
telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_ids_env: TELEGRAM_CHAT_ID
  proxy: null
# 即时消息总开关（覆盖 SmartNotification 与直连 TG）
messaging:
  instant:
    enabled: true
    channels:
    - telegram
    - log
openclaw_push:
  # 默认开启 OpenClaw 实时推送（交易/风控/系统告警）
  enabled: true
  # 默认标准接入点；若你的 OpenClaw 网关地址不同，请在 local.yaml 覆盖。
  url: http://127.0.0.1:18789/api/events/ingest
  token: ''
  timeout_sec: 3.0
  min_interval_sec: 0.1
  max_queue: 5000
  retry: 3
api:
  enabled: true
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false
  debug: false
  cors:
    enabled: true
    allow_origins:
    - '*'
    allow_methods:
    - '*'
    allow_headers:
    - '*'
  auth:
    enabled: true
    admin_username: cool
    admin_password: '095136'
    api_key_header: X-API-Key
    api_key_env: API_KEY
  enable_cors: true
  enable_swagger: true
database:
  type: sqlite
  path: data/trading.db
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
cache:
  enabled: true
  type: memory
  redis:
    # Docker Compose 默认服务名；本机非容器请用 local.yaml 改为 localhost
    host: redis
    port: 6379
    db: 0
    password_env: REDIS_PASSWORD
  default_ttl: 300
  max_size: 1000
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file:
    enabled: true
    path: logs/trading.log
    max_size: 10MB
    backup_count: 5
  console:
    enabled: true
    colorize: true
proxy:
  enabled: true
  # 网卡级强制分流：在「服务器宿主机」Clash/mihomo 上开 TUN + rules（见 deploy/HOST_CLASH_EGRESS.md）。
  # 此处 egress_model=process_env 表示应用内 HTTP 客户端与 NO_PROXY 合并；与宿主机 TUN 互补。
  egress_model: process_env
  apply_to_process_env: true
  respect_existing_env: true
  force_override_env: false
  merge_no_proxy_from_config: true
  use_global_proxy: true
  # OKX 专用：HTTP 代理经 Clash CONNECT 频繁断开时，可将 ignore_env_proxy 设为 true（OKX REST 直连，需容器出口可达 www.okx.com）
  okx:
    proxy_only: false
    ignore_env_proxy: false
  no_proxy_extra:
  - redis
  - localhost
  - 127.0.0.1
  - host.docker.internal
  global_proxy:
    enabled: true
    proxy_type: http
    # 默认本机 Mihomo/Clash mixed-port；Docker bridge 可改为 host.docker.internal（见 config/local.example 或部署文档）
    host: 127.0.0.1
    port: 7890
    username_env: PROXY_USER
    password_env: PROXY_PASSWORD
  clash:
    auto_detect: true
    port: 7890
    socks_port: 7891
    api_port: 9090
  domain_proxies: []
  bypass_domains:
  - localhost
  - 127.0.0.1
  - '*.local'
  - '*.internal'
backup:
  enabled: true
  interval: 86400
  retention_days: 30
  include:
  - data
  - config
  - logs
  exclude:
  - '*.tmp'
  - '*.log'
plugins:
  enabled: true
  auto_load: true
  directory: plugins
  loaded: []
development:
  debug: false
  use_mock_data: false
  mock_data_size: 1000
  testing:
    enabled: false
    mock_exchange: true
    mock_llm: true
controller:
  auto_restart_modules: true
  max_restart_attempts: 3
  health_check_interval: 30
  event_history_limit: 1000
ai_core:
  # 生产稳态：保留自动回测/优化，但单轮限额，避免抢占交易主链路。
  authorization:
    auto_backtest: true
    auto_optimize: true
  runtime:
    strategy_check_interval: 3600
    max_backtest_strategies_per_cycle: 1
    max_optimize_strategies_per_cycle: 1
    skip_backtest_if_cpu_above: 85
    skip_optimize_if_cpu_above: 85
ai_core_runtime:
  # 收益修复第一阶段：先压尾部回撤，再提升开仓质量门槛（可回滚小步调参）
  min_confidence_to_trade: 0.65
  ai_core_min_confidence_to_open: 0.65
  ai_core_min_confidence_floor: 0.65
  max_same_direction_ratio: 0.7
  # Batch1 tune (2026-05-04): small-step relaxation; keep >1.0 to avoid quality collapse.
  min_rr_to_trade: 1.85
  # 当交易所/数据链路降级时，进一步收缩开仓仓位，降低回撤尾部
  degraded_data_quantity_factor: 0.55
  exchange_reachability_degraded_quantity_factor: 0.5
  # 连亏冷却：更早触发、更长冷却，优先保护资金曲线
  loss_streak_trigger: 2
  loss_streak_cooldown_sec: 3600
  max_spread_bps_to_trade: 42.0
  # 统一分析链路硬门槛：分析质量/置信不足或降级数据时，禁止开仓
  analysis_hard_gate_for_open: true
  analysis_min_confidence_for_open: 0.53
  min_data_quality_to_trade: 0.53
  analysis_require_not_degraded_for_open: true
  # 低波动缓趋势：与引擎内 low_vol_grind 市况对齐（可热更新）
  regime_trend_threshold: 0.0048
  # Batch1 tune: raise grind trend floor to filter sideways noise.
  regime_grind_min_trend_abs: 0.0007
  regime_grind_max_atr_mult: 1.25
  low_vol_grind_profile_min_rr_mult: 0.98
  low_vol_grind_profile_spread_mult: 1.06
  regime_profile_overrides:
    trend:
      min_rr_mult: 0.95
      spread_mult: 1.06
      qty_mult: 1.05
      min_conf_add: -0.005
    range:
      min_rr_mult: 0.99
      spread_mult: 1.0
      qty_mult: 1.03
      min_conf_add: 0.0
    high_vol:
      min_rr_mult: 1.16
      spread_mult: 0.88
      qty_mult: 0.55
      min_conf_add: 0.03
    low_liquidity:
      min_rr_mult: 1.12
      spread_mult: 0.82
      qty_mult: 0.68
      min_conf_add: 0.03
    low_vol_grind:
      min_rr_mult: 0.96
      spread_mult: 1.07
      qty_mult: 0.88
      min_conf_add: -0.012
  # 净边际：低波动时边际更薄，略降仍要求为正
  edge_min_net_reward_pct: 0.004
  # hold_avoidance_override：缓趋势下 fusion sentiment 往往较小，略放宽
  hold_avoidance_override_min_abs_sentiment: 0.034
  hold_avoidance_override_min_mi_quality_score: 0.545
  hold_override_high_risk_min_effective_conf: 0.5
  hold_override_high_risk_min_mi_quality: 0.55
  hold_override_high_risk_min_mi_conf: 0.3
  hold_avoidance_override_require_mi_trend_alignment: false
  hold_avoidance_override_cooldown_sec: 300
  ai_autonomy_min_conf_floor: 0.51
  ai_autonomy_min_mi_confidence: 0.565
  ai_autonomy_min_mi_quality_score: 0.535
ai_brain:
  primary_controller: ai_core
  single_write_owner: ai_core
  enable_secondary_controller: false
  enable_autonomous_executor: true
  policy:
    allow_system_open: false
    gateway_sets_leverage: false
paths:
  base_path: /app
  data_path: /app/data
  log_path: /app/logs
  workspace_path: /app/workspace
  trade_history_path: data/trade_history
  templates_dir: /app/templates
  models_path: /app/data/models
  memory_path: /app/workspace/memory
  trading_path: /app
timing:
  config_watch_interval: 30
active_trader:
  # 开仓最小间隔提升到 60 秒，降低噪声交易
  min_trade_interval: 60
proactive_scanner:
  scan_interval: 90
  deep_scan_interval: 600
  # 均衡档：单轮扫描覆盖更多候选，但避免过大导致数据源压力/超时
  scan_symbol_limit: 12
  # 开启后：扫描器对“高置信 + 通过实时数据预检”的机会会触发开仓（走 ExecutionGateway）
  proactive_auto_execute_opportunities: false
  # 转发给 ai_core 的冷却收敛到 60 秒
  proactive_ai_core_forward_cooldown_sec: 60
  # 均值回归机会的 confidence 由 |24h涨跌幅|×10 推导；0.55≈5.5% 才会触发执行评估。
  # 小幅放宽：置信度 >=74% 才允许自动开仓评估
  proactive_execute_min_confidence: 0.74
  # 防止“连续开多个标的把可用资金耗尽”
  proactive_global_open_max_per_10m: 1
  proactive_global_open_max_per_hour: 3
  # 默认禁止同向加仓（除非你明确要做网格/DCA）
  proactive_allow_scale_in: false
  # 止损后冷却：避免“止损后立刻再开/复仇单”
  proactive_stop_loss_cooldown_sec: 1800
  # 原值 0.08(8%) 过于激进，会导致多数时间“无机会”，从而看起来系统不产生开仓线索。
  # 发现层小幅放宽：均值回归约 2.4% 即可入候选
  mean_reversion_min_abs_change: 0.024
  # 发现层小幅放宽：突破量能确认降低到 1.1
  breakout_min_volume_vs_prior_avg: 1.1
  proactive_symbol_trade_cooldown_sec: 60
  breakout_trade_cooldown_sec: 60
  proactive_skip_breakout_if_same_side_position: true
  # 发现层小幅放宽：更容易捕捉波动异动
  # 略降：低波动期仍能发现「相对放大」的异动
  vol_spike_min_atr_pct_1h: 0.009
  vol_spike_min_quality_score: 0.6
  # 均衡档：盘口/流动性异动发现（spread 变宽 + 深度失衡）
  liq_event_min_quality_score: 0.6
  # 两档：minor 更容易触发；major 更强信号
  liq_event_minor_min_spread_bps: 10.0
  liq_event_minor_min_abs_depth_imbalance: 0.76
  liq_event_major_min_spread_bps: 18.0
  liq_event_major_min_abs_depth_imbalance: 0.88
  liq_event_minor_confidence: 0.78
  liq_event_major_confidence: 0.84
  # 按质量动态阈值（quality 越高越早触发）
  liq_event_quality_high: 0.75
  liq_event_quality_low: 0.65
  scanner_opportunity_gate:
    enabled: true
    max_spread_bps: 45.0
    # 允许入场价与最新价存在一定偏差（突破/均值回归会用K线收盘或关键价位作为entry），
    # 过严会导致机会全部被门控拦截，从而看起来“系统不自动开仓”。
    max_entry_vs_last_slippage_pct: 0.05
    # 微调放宽：RR 门槛小降，减少边界机会被预检拦截
    # Batch1 tune: small relaxation only; avoid one-shot drop to 1.0.
    min_risk_reward: 1.05
    min_abs_change_24h: 0.0
    require_insight_trend_alignment: true
    min_volume_vs_avg_ratio: 0.0
    volume_avg_lookback_bars: 12
    min_atr_pct_1h: 0.00025
    max_atr_pct_1h: 0.15
