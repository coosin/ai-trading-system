timing:
  config_watch_interval: 30
active_trader:
  # 开仓最小间隔提升到 60 秒，降低噪声交易
  min_trade_interval: 60
proactive_scanner:
  scan_interval: 90
  deep_scan_interval: 600
  # 均衡档：单轮扫描覆盖更多候选，但避免过大导致数据源压力/超时
  scan_symbol_limit: 12
  # 开启后：扫描器对“高置信 + 通过实时数据预检”的机会会触发开仓（走 ExecutionGateway）
  proactive_auto_execute_opportunities: false
  # 转发给 ai_core 的冷却收敛到 60 秒
  proactive_ai_core_forward_cooldown_sec: 60
  # 若机会内容几乎不变，则在更长窗口内不重复推送给 ai_core，减少同质噪声
  proactive_ai_core_forward_stable_window_sec: 240
  # 均值回归机会的 confidence 由 |24h涨跌幅|×10 推导；0.55≈5.5% 才会触发执行评估。
  # 小幅放宽：置信度 >=74% 才允许自动开仓评估
  proactive_execute_min_confidence: 0.74
  # 防止“连续开多个标的把可用资金耗尽”
  proactive_global_open_max_per_10m: 1
  proactive_global_open_max_per_hour: 3
  # 默认禁止同向加仓（除非你明确要做网格/DCA）
  proactive_allow_scale_in: false
  # 止损后冷却：避免“止损后立刻再开/复仇单”
  proactive_stop_loss_cooldown_sec: 1800
  # 原值 0.08(8%) 过于激进，会导致多数时间“无机会”，从而看起来系统不产生开仓线索。
  # 发现层小幅放宽：均值回归约 2.4% 即可入候选
  mean_reversion_min_abs_change: 0.024
  # 发现层小幅放宽：突破量能确认降低到 1.1
  breakout_min_volume_vs_prior_avg: 1.1
  proactive_symbol_trade_cooldown_sec: 60
  breakout_trade_cooldown_sec: 60
  proactive_skip_breakout_if_same_side_position: true
  proactive_skip_same_side_position_any_opportunity: true
  proactive_volatility_spike_forward_cooldown_sec: 600
  proactive_volatility_spike_forward_stable_window_sec: 900
  # 发现层小幅放宽：更容易捕捉波动异动
  # 略降：低波动期仍能发现「相对放大」的异动
  vol_spike_min_atr_pct_1h: 0.009
  vol_spike_min_quality_score: 0.6
  # 均衡档：盘口/流动性异动发现（spread 变宽 + 深度失衡）
  liq_event_min_quality_score: 0.6
  # 两档：minor 更容易触发；major 更强信号
  liq_event_minor_min_spread_bps: 10.0
  liq_event_minor_min_abs_depth_imbalance: 0.76
  liq_event_major_min_spread_bps: 18.0
  liq_event_major_min_abs_depth_imbalance: 0.88
  liq_event_minor_confidence: 0.78
  liq_event_major_confidence: 0.84
  # 按质量动态阈值（quality 越高越早触发）
  liq_event_quality_high: 0.75
  liq_event_quality_low: 0.65
  scanner_opportunity_gate:
    enabled: true
    max_spread_bps: 45.0
    # 允许入场价与最新价存在一定偏差（突破/均值回归会用K线收盘或关键价位作为entry），
    # 过严会导致机会全部被门控拦截，从而看起来“系统不自动开仓”。
    max_entry_vs_last_slippage_pct: 0.057
    # 扫描器只做“发现+初筛”，边界机会允许略宽，后续仍会经过 ai_core 执行门控。
    min_risk_reward: 0.98
    # partial/live 视图仍保守一些，但不要直接抬回 ai_core 的执行 RR。
    partial_min_risk_reward: 0.98
    partial_max_spread_bps: 35.0
    min_abs_change_24h: 0.0
    require_insight_trend_alignment: true
    min_volume_vs_avg_ratio: 0.0
    volume_avg_lookback_bars: 12
    min_atr_pct_1h: 0.00025
    max_atr_pct_1h: 0.15
  default_symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - XRP/USDT
  - DOGE/USDT
  - ADA/USDT
  - AVAX/USDT
  - DOT/USDT
