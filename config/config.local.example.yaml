# 复制为同目录 local.yaml（或 local.yml / local.json），填写本机密钥与覆盖项。
# 该文件被 Git 忽略；ConfigManager 会在加载 config/config.yaml 之后深合并 local.*。
#
# 示例（取消注释并修改）：
# llm:
#   default_model: doubao-seed-2.0-pro
#   models:
#   - provider: openai
#     model_id: doubao-seed-2.0-pro
#     api_key_env: ARK_API_KEY
#     base_url: https://ark.cn-beijing.volces.com/api/coding/v3
# trading:
#   paper_trading: true
#
# 建议在 .env 或服务环境变量中设置：
#   ARK_API_KEY=ark-xxxx
