  #     - POSTGRES_USER=${POSTGRES_USER:-trader}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
  #     - POSTGRES_DB=${POSTGRES_DB:-trading_db}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  redis-data:
