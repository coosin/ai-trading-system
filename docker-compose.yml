name: openclaw-trading

services:
  trading-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-trading:latest
    container_name: openclaw-trading
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    init: true
    stop_grace_period: 90s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
      - ./src:/app/src
      - ./scripts:/app/scripts:ro
      - ./tests:/app/tests:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./backups:/app/backups
    env_file:
      - .env
    environment:
      - MODE=${MODE:-simulation}
      - OPENCLAW__trading__mode=${TRADING_MODE:-simulation}
      - OPENCLAW__system__mode=${SYSTEM_MODE:-simulation}
      - OKX_TESTNET=${OKX_TESTNET:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HTTP_PROXY=${OPENCLAW_HTTP_PROXY:-}
      - HTTPS_PROXY=${OPENCLAW_HTTPS_PROXY:-}
      - ALL_PROXY=${OPENCLAW_ALL_PROXY:-}
      # 与 config.proxy.no_proxy_extra / bypass_domains 合并；可在 .env 中整行覆盖 NO_PROXY
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,redis,host.docker.internal,.okx.com,okx.com}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1,redis,host.docker.internal,.okx.com,okx.com}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_search: []
    dns_opt:
      - "timeout:2"
      - "attempts:3"
    networks:
      - trading-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 45s
      timeout: 25s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  trading-network:
    driver: bridge

# 生产推荐：在「宿主机」安装 Clash/mihomo，TUN + auto-route 接管本机出站与分流；容器走
# host.docker.internal:7890 或 trading-system 使用 network_mode: host。说明见：
#   deploy/HOST_CLASH_EGRESS.md
# ---------------------------------------------------------------------------
# 可选：同 compose 内 egress 侧车（无宿主机 Clash 时）
#   docker compose --profile egress-sidecar up -d
# ---------------------------------------------------------------------------
