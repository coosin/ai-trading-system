name: openclaw-trading

services:
  trading-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-trading:latest
    container_name: openclaw-trading
    # 与宿主机挂载目录属主一致（常见为 uid 1000），避免 data/logs 写权限错误
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./backups:/app/backups
    env_file:
      - .env
    environment:
      - MODE=${MODE:-simulation}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # 避免宿主机 HTTP(S)_PROXY 意外污染容器；如需代理请用 OPENCLAW_HTTP_PROXY/OPENCLAW_HTTPS_PROXY
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      # 容器内访问宿主机 Clash：host.docker.internal -> host-gateway（见 extra_hosts）
      - OPENCLAW_HTTP_PROXY=${OPENCLAW_HTTP_PROXY:-http://host.docker.internal:7890}
      - OPENCLAW_HTTPS_PROXY=${OPENCLAW_HTTPS_PROXY:-http://host.docker.internal:7890}
      - OPENCLAW_ALL_PROXY=${OPENCLAW_ALL_PROXY:-http://host.docker.internal:7890}
      # OKX 高频请求稳态参数（由专项压测确定）
      - OPENCLAW_OKX_MAX_CONCURRENCY=${OPENCLAW_OKX_MAX_CONCURRENCY:-4}
      - OPENCLAW_OKX_MIN_REQUEST_INTERVAL=${OPENCLAW_OKX_MIN_REQUEST_INTERVAL:-0.2}
      - OPENCLAW_OKX_MAX_RETRIES=${OPENCLAW_OKX_MAX_RETRIES:-3}
      # 避免对容器内部地址走代理
      - NO_PROXY=localhost,127.0.0.1,redis
      - no_proxy=localhost,127.0.0.1,redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # 稳定 DNS：避免容器内偶发解析失败（如 api.okx.com）
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - trading-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  trading-network:
    driver: bridge

volumes:
  redis-data:
