name: openclaw-trading

services:
  trading-system:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-trading:latest
    container_name: openclaw-trading
    # 与宿主机挂载目录属主一致（常见为 uid 1000），避免 data/logs 写权限错误
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    init: true
    stop_grace_period: 90s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # 挂载源码：修改 src/ 后执行 `docker compose restart trading-system` 即可加载（无需 rebuild）
      - ./src:/app/src
      # 测试目录：便于容器内执行 pytest（与宿主机一致，无需重建镜像）
      - ./tests:/app/tests:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./backups:/app/backups
    env_file:
      - .env
    environment:
      # 容器化生产默认：实盘（与 OPENCLAW__* 覆盖 data/config）；本地/回测可在 .env 设 MODE=simulation
      - MODE=${MODE:-live_trading}
      - OPENCLAW__trading__mode=${TRADING_MODE:-live_trading}
      - OPENCLAW__system__mode=${SYSTEM_MODE:-live_trading}
      # 主网实盘默认 0；模拟盘 OKX 填 OKX_TESTNET=1
      - OKX_TESTNET=${OKX_TESTNET:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # 全局 HTTP(S)_PROXY：供 LLM/第三方等使用；OKX 默认见 OPENCLAW_OKX_IGNORE_ENV_PROXY（避免 Docker→Clash CONNECT 失败拖死行情）
      - HTTP_PROXY=${OPENCLAW_HTTP_PROXY:-http://host.docker.internal:7890}
      - HTTPS_PROXY=${OPENCLAW_HTTPS_PROXY:-http://host.docker.internal:7890}
      - ALL_PROXY=${OPENCLAW_ALL_PROXY:-http://host.docker.internal:7890}
      - http_proxy=${OPENCLAW_HTTP_PROXY:-http://host.docker.internal:7890}
      - https_proxy=${OPENCLAW_HTTPS_PROXY:-http://host.docker.internal:7890}
      - all_proxy=${OPENCLAW_ALL_PROXY:-http://host.docker.internal:7890}
      # 容器内访问宿主机 Clash：host.docker.internal -> host-gateway（见 extra_hosts）
      - OPENCLAW_HTTP_PROXY=${OPENCLAW_HTTP_PROXY:-http://host.docker.internal:7890}
      - OPENCLAW_HTTPS_PROXY=${OPENCLAW_HTTPS_PROXY:-http://host.docker.internal:7890}
      - OPENCLAW_ALL_PROXY=${OPENCLAW_ALL_PROXY:-http://host.docker.internal:7890}
      # OKX 高频请求稳态参数（由专项压测确定）
      - OPENCLAW_OKX_MAX_CONCURRENCY=${OPENCLAW_OKX_MAX_CONCURRENCY:-2}
      - OPENCLAW_OKX_MIN_REQUEST_INTERVAL=${OPENCLAW_OKX_MIN_REQUEST_INTERVAL:-0.1}
      - OPENCLAW_OKX_MAX_RETRIES=${OPENCLAW_OKX_MAX_RETRIES:-3}
      # OKX：IGNORE=1 时 REST/WS 均直连（压测最稳，且跳过 proxy_manager）；必须经代理时设 IGNORE=0 并修好 Docker→Clash CONNECT
      - OPENCLAW_OKX_IGNORE_ENV_PROXY=${OPENCLAW_OKX_IGNORE_ENV_PROXY:-1}
      - OPENCLAW_OKX_PROXY_ONLY=${OPENCLAW_OKX_PROXY_ONLY:-0}
      # OKX WebSocket（v5）：与 REST 共用 aiohttp 会话；IGNORE=1 时 WS 与 REST 同为直连（最稳）
      - OPENCLAW_OKX_WS_ENABLED=${OPENCLAW_OKX_WS_ENABLED:-1}
      - OPENCLAW_OKX_WS_TICKER_FASTPATH=${OPENCLAW_OKX_WS_TICKER_FASTPATH:-1}
      - OPENCLAW_OKX_WS_TICKER_MAX_AGE_MS=${OPENCLAW_OKX_WS_TICKER_MAX_AGE_MS:-4000}
      - OPENCLAW_OKX_WS_TICKER_INSTIDS=${OPENCLAW_OKX_WS_TICKER_INSTIDS:-BTC-USDT-SWAP,ETH-USDT-SWAP,SOL-USDT-SWAP}
      # 司令部：默认 LLM 意图解析并执行；设为 1 则仅闲聊（除问价/身份快路径）
      - OPENCLAW_COMMANDER_MINIMAL_MODE=${OPENCLAW_COMMANDER_MINIMAL_MODE:-0}
      - OPENCLAW_COMMANDER_GROUNDED_CHAT=${OPENCLAW_COMMANDER_GROUNDED_CHAT:-1}
      - OPENCLAW_COMMANDER_HONESTY_STRICT=${OPENCLAW_COMMANDER_HONESTY_STRICT:-1}
      # 避免对容器内部与 OKX 域名走全局代理（部分 HTTP 客户端尊重 NO_PROXY；OKX 主链路由 IGNORE 保证直连）
      - NO_PROXY=localhost,127.0.0.1,redis,.okx.com,okx.com
      - no_proxy=localhost,127.0.0.1,redis,.okx.com,okx.com
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # 稳定 DNS：避免容器内偶发解析失败（如 api.okx.com）
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - trading-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: openclaw-redis
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  trading-network:
    driver: bridge

volumes:
  redis-data:
